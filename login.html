<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Automate with Hami</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
        }

        .auth-bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, rgba(10,10,13,0) 60%);
            z-index: 0;
            pointer-events: none;
        }

        .auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .auth-card .logo {
            display: block;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-family: var(--font-heading);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-body);
            transition: border-color var(--transition-fast), background var(--transition-fast);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .forgot-link {
            color: var(--accent-primary);
            font-weight: 500;
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--text-primary);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container fade-in appear">
        <div class="auth-bg-glow"></div>
        <div class="auth-card">
            <a href="index.html" class="logo">Automate<span class="highlight">with</span>Hami</a>
            
            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Enter your details to access the automation engine.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="dispatch@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100">Sign in to Dashboard <i class="fa-solid fa-arrow-right"></i></button>
            </form>

            <script>
                document.getElementById('loginForm').addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const btn = this.querySelector('button[type="submit"]');
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Checking...';
                    
                    try {
                        const res = await fetch('http://localhost:3000/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });
                        const data = await res.json();
                        
                        if (data.success) {
                            localStorage.setItem('adminEmail', data.email);
                            window.location.href = 'dashboard.html';
                        } else {
                            alert(data.error || 'Login failed');
                            btn.innerHTML = 'Sign in to Dashboard <i class="fa-solid fa-arrow-right"></i>';
                        }
                    } catch (err) {
                        alert('Could not connect to server. Is it running?');
                        btn.innerHTML = 'Sign in to Dashboard <i class="fa-solid fa-arrow-right"></i>';
                    }
                });
            </script>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Get Started</a>
            </div>
        </div>
    </div>
    <script src="js/cursor.js"></script>
</body>
</html>
